defaults:
  - _self_
  - logging/hydra_config
  - logging: other_loggers

dataset_name: Mardiyyah/TAPT_CeLLaTe1.0
data_kwargs: cellate
data_version: null
text_col: FullText


model_checkpoint: microsoft/BiomedNLP-BiomedBERT-base-uncased-abstract-fulltext
tokenizer_checkpoint: Mardiyyah/biomedbert_tokenizer_extended
seed: 3407
num_epochs: 20
batch_size: 16
warmup_ratio: 0.06
adam_epsilon: 1e-6
optimizer: "AdamW"
eval_batch_size: 16
lr: 2e-5 #options [1e-4, 5e-5]

use_whole_word_mask: true
mlm_probablity: 0.15
push_to_hub: true
use_wandb: false
training_strategy: tapt_base #type of training strategy: Options[tapt_base, tapt_reinit_only, tapt_reinit_llrd, tapt_llrd_only]
group_text: true
#reinit strategy parameters
weight_decay: 0.01
reinit_k_layers: 2
reinit_classifier: false
# reinit_pooler: false
llrd: 0.9 #options [0.9, 0.95]

classifier_dropout: 0.1
