defaults:
  - _self_
  - logging/hydra_config
  - logging: other_loggers
  - model: ner
  - data: CeLLaTe1.0_no_vague
  


task_type: ner
seed: 3407
num_epochs: 10
batch_size: 16
warmup_ratio: 0.1
optimizer: "AdamW"
eval_batch_size: 16
lr: 2e-5 #options [1e-4, 5e-5]

use_wandb: false
training_strategy: base #type of training strategy: Options[base, reinit_only, reinit_llrd,]


#reinit strategy parameters
weight_decay: 0.01
reinit_k_layers: 4
reinit_classifier: false
renit_pooler: false
llrd_factor: 0.9 #options [0.9, 0.95]

#push to hub params
publish_model: true
repo_id: ""
commit_message: ""
push_to_org_repo: true

training_kwargs: ""